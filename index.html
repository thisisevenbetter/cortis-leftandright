<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>콜페스 공수취향표 생성기</title>
  <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
  <style>
    :root {
      --bg: #f6f2ee;
      --card: #fffdfb;
      --text: #171717;
      --muted: #756d66;
      --line: #1d1d1d;
      --soft-line: #ded6cf;
      --accent: #6f8f7b;
      --accent-soft: #dce8df;
      --chip: #222222;
      --result-bg: #f3eee8;
      --radius-xl: 28px;
      --radius-lg: 22px;
      --radius-md: 16px;
      --shadow: 0 14px 34px rgba(41, 31, 21, 0.08);
      --font: "Pretendard", "Apple SD Gothic Neo", "Noto Sans KR", system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      padding: 0;
      background:
        radial-gradient(circle at top left, rgba(220, 232, 223, 0.7), transparent 30%),
        linear-gradient(180deg, #f9f6f2 0%, #f6f2ee 100%);
      color: var(--text);
      font-family: var(--font);
    }

    body {
      min-height: 100vh;
      overflow-x: auto;
    }

    button, input, textarea {
      font: inherit;
    }

    .app {
      width: 1200px;
      min-width: 1200px;
      margin: 0 auto;
      padding: 28px 0 40px;
    }

    .screen {
      display: none;
    }

    .screen.active {
      display: block;
    }

    .hero {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }

    .title-wrap {
      display: flex;
      align-items: center;
      gap: 16px;
      min-width: 0;
    }

    .logo-mark{
      width:64px;
      height:64px;
      border-radius:50%;
      border:3px solid #111;
      overflow:hidden;
      display:flex;
      align-items:center;
      justify-content:center;
      background:white;
    }
    
    .logo-mark img,
    .result-logo img{
      width:120%;
      height:120%;
      object-fit:cover;
      border-radius:50%;
    }

    .hero h1 {
      margin: 0;
      font-size: clamp(28px, 4vw, 46px);
      line-height: 1.08;
      letter-spacing: -0.05em;
    }

    .hero-sub {
      color: var(--muted);
      font-size: 14px;
      margin-top: 4px;
    }

    .panel {
      background: rgba(255,253,251,0.92);
      border: 1.5px solid #d8cfc7;
      border-radius: 26px;
      box-shadow: var(--shadow);
      padding: 18px;
      margin-bottom: 14px;
    }

    .top-fields {
      display: grid;
      grid-template-columns: 120px 1fr 1fr;
      gap: 12px;
      align-items: center;
    }

    .otp-badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      height: 52px;
      border-radius: 999px;
      background: linear-gradient(180deg, #2b2b2b, #131313);
      color: #fff;
      font-weight: 800;
      letter-spacing: -0.02em;
      padding: 0 18px;
      white-space: nowrap;
    }

    .input, .textarea {
      width: 100%;
      border: 1.5px solid #302b27;
      background: #fffdfa;
      border-radius: 18px;
      padding: 14px 16px;
      outline: none;
      transition: box-shadow 0.15s ease, transform 0.15s ease, border-color 0.15s ease;
    }

    .textarea {
      min-height: 104px;
      resize: vertical;
      line-height: 1.55;
    }

    .input:focus, .textarea:focus {
      box-shadow: 0 0 0 4px rgba(111,143,123,0.14);
      border-color: var(--accent);
    }

    .members {
      display: grid;
      gap: 14px;
    }

    .member-editor {
      background: linear-gradient(180deg, rgba(255,255,255,0.9), rgba(250,246,241,0.95));
      border: 1.5px solid #1e1e1e;
      border-radius: 26px;
      padding: 16px;
      box-shadow: var(--shadow);
      position: relative;
      overflow: hidden;
    }

    .member-editor::before {
      content: "";
      position: absolute;
      inset: 0 auto 0 0;
      width: 8px;
      background: linear-gradient(180deg, var(--accent), rgba(111,143,123,0.2));
    }

    .member-top {
      display: flex;
      gap: 16px;
      align-items: center;
      margin-bottom: 14px;
      padding-left: 8px;
    }

    .avatar {
      width: 60px;
      height: 60px;
      border-radius: 999px;
      object-fit: cover;
      flex-shrink: 0;
      border: 1.5px solid #ddd;
      background: #e8e8e8;
    }

    .member-name {
      font-size: 24px;
      font-weight: 800;
      letter-spacing: -0.04em;
    }

    .member-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 12px;
      padding-left: 8px;
    }

    .ratio-header {
      display: grid;
      grid-template-columns: auto 1fr auto;
      align-items: center;
      gap: 12px;
      margin-bottom: 10px;
    }

    .ratio-side {
      font-weight: 800;
      font-size: 17px;
      line-height: 1.1;
      text-align: center;
      min-width: 52px;
    }

    .ratio-side span {
      display: block;
      font-size: 23px;
      letter-spacing: -0.03em;
    }

    .slider-wrap {
      padding: 0 4px;
    }

    input[type="range"] {
      -webkit-appearance: none;
      appearance: none;
      width: 100%;
      height: 12px;
      background: linear-gradient(to right, var(--accent) 0%, var(--accent) var(--fill, 50%), #ece5dd var(--fill, 50%), #ece5dd 100%);
      border: 1.5px solid #111;
      border-radius: 999px;
      outline: none;
      margin: 0;
    }

    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 24px;
      height: 24px;
      border-radius: 50%;
      background: #111;
      border: 2px solid #fff;
      box-shadow: 0 2px 8px rgba(0,0,0,0.18);
      cursor: pointer;
    }

    input[type="range"]::-moz-range-thumb {
      width: 24px;
      height: 24px;
      border-radius: 50%;
      background: #111;
      border: 2px solid #fff;
      box-shadow: 0 2px 8px rgba(0,0,0,0.18);
      cursor: pointer;
    }

    .actions {
      display: flex;
      gap: 12px;
      justify-content: flex-end;
      margin-top: 18px;
      flex-wrap: wrap;
    }

    .btn {
      appearance: none;
      border: none;
      border-radius: 999px;
      background: linear-gradient(180deg, #202020, #111111);
      color: #fff;
      padding: 14px 22px;
      font-weight: 800;
      cursor: pointer;
      transition: transform 0.15s ease, opacity 0.15s ease;
      box-shadow: 0 8px 20px rgba(0,0,0,0.08);
    }

    .btn:hover {
      transform: translateY(-1px);
    }

    .btn.secondary {
      background: #fffdf9;
      color: #111;
      border: 1.5px solid #111;
      box-shadow: none;
    }

    .result-actions {
      display: flex;
      gap: 12px;
      justify-content: center;
      margin-top: 18px;
      flex-wrap: wrap;
    }

    .result-wrap {
      display: flex;
      justify-content: center;
      overflow-x: auto;
      padding-bottom: 8px;
    }

    #resultCanvas {
      width: 1200px;
      height: 800px;
      background:
        radial-gradient(circle at top right, rgba(220, 232, 223, 0.85), transparent 24%),
        linear-gradient(180deg, #f8f4ef 0%, var(--result-bg) 100%);
      color: #111;
      padding: 26px 34px 18px;
      position: relative;
      overflow: hidden;
      flex: 0 0 auto;
    }

    .result-header {
      display: grid;
      grid-template-columns: auto 1fr auto;
      align-items: center;
      gap: 14px;
      margin-bottom: 16px;
    }

    .chip {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 42px;
      padding: 0 18px;
      border-radius: 999px;
      background: var(--chip);
      color: #fff;
      font-size: 20px;
      font-weight: 900;
      letter-spacing: -0.04em;
      line-height: 1;
      box-shadow: 0 8px 18px rgba(0,0,0,0.08);
    }

    .result-title-box {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 14px;
      min-width: 0;
    }

    .result-logo{
      width:64px;
      height:64px;
      border-radius:50%;
      border:3px solid #111;
      overflow:hidden;
      display:flex;
      align-items:center;
      justify-content:center;
      background:white;
    }
    
    .result-logo img{
      width:100%;
      height:100%;
      object-fit:cover;
    }

    .result-title {
      font-size: 32px;
      font-weight: 900;
      letter-spacing: -0.05em;
      line-height: 1;
      white-space: nowrap;
    }

    .nickname-chip {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 40px;
      min-width: 96px;
      max-width: 180px;
      padding: 0 14px;
      border-radius: 999px;
      background: rgba(255,255,255,0.75);
      color: #111;
      font-size: 16px;
      font-weight: 700;
      line-height: 1;
      text-align: center;
      white-space: nowrap;
      border: 1.5px solid #111;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .result-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      column-gap: 20px;
      row-gap: 12px;
    }
    
    .result-card {
      display: grid;
      grid-template-columns: 110px minmax(0, 1fr);
      gap: 12px;
      align-items: start;
      background: rgba(255,255,255,0.32);
      border: 1.5px solid rgba(0,0,0,0.1);
      border-radius: 22px;
      padding: 12px;
      backdrop-filter: blur(2px);
    }

    .result-avatar {
      width: 110px;
      height: 110px;
      min-width: 110px;
      min-height: 110px;
      max-width: 110px;
      max-height: 110px;
      border-radius: 50%;
      overflow: hidden;
      background: #dadada;
      border: 2px solid rgba(255,255,255,0.9);
      box-shadow: 0 8px 14px rgba(0,0,0,0.08);
      position: relative;
    }
    
    .result-avatar-image {
      position: absolute;
      inset: 0;
      background-size: contain;
      background-position: center;
      background-repeat: no-repeat;
    }

    .result-content {
      min-width: 0;
    }

    .bar-row {
      display: grid;
      grid-template-columns: 34px minmax(0, 1fr) 34px;
      gap: 16px;
      align-items: center;
      margin: 2px 0 14px;
      width: 100%;
    }

    .bar-side {
      font-size: 18px;
      font-weight: 800;
      line-height: 1.05;
      text-align: center;
      width: 38px;
      color: #232323;
    }

    .bar-side strong {
      display: block;
      font-size: 18px;
    }

    .bar-track {
      position: relative;
      width: 100%;
      height: 22px;
      border: 2px solid #222;
      border-radius: 999px;
      background: #fffdf9;
      overflow: hidden;
    }
    
    .bar-thumb {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      width: 92px;
      height: 20px;
      background: #7f9a87;
      border-radius: 999px;
    }

    .reason-box {
      min-height: 118px;
      border: 1.6px solid #111;
      border-radius: 18px;
      background: rgba(255,255,255,0.7);
      padding: 12px 12px 10px;
      font-size: 15px;
      line-height: 1.45;
      letter-spacing: -0.02em;
      word-break: keep-all;
      white-space: pre-wrap;
      overflow-wrap: break-word;
    }

    .result-footer {
      margin-top: 8px;
      padding-top: 0;
      text-align: center;
      font-size: 14px;
      color: #6b6b6b;
    }

    .hidden-preload {
      position: absolute;
      opacity: 0;
      pointer-events: none;
      width: 0;
      height: 0;
      overflow: hidden;
    }

    @media (max-width: 900px) {
      .top-fields {
        grid-template-columns: 1fr;
      }

      .hero {
        align-items: flex-start;
      }

      .member-top {
        align-items: flex-start;
      }
    }

    @media (max-width: 560px) {
      .app {
        width: min(100%, calc(100% - 20px));
        padding-top: 16px;
      }

      .panel,
      .member-editor {
        padding: 14px;
        border-radius: 18px;
      }

      .member-top {
        gap: 12px;
      }

      .avatar {
        width: 52px;
        height: 52px;
      }

      .member-name {
        font-size: 21px;
      }

      .ratio-side {
        min-width: 44px;
        font-size: 15px;
      }

      .ratio-side span {
        font-size: 20px;
      }

      .actions,
      .result-actions {
        justify-content: stretch;
      }

      .btn {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <section id="editorScreen" class="screen active">
      <div class="hero">
        <div class="title-wrap">
          <div class="logo-mark">
            <img src="img/logo.jpg">
          </div>
          <div>
            <h1>코르티스 공수취향표</h1>
            <div class="hero-sub">슬라이더로 공수 비율을 조정하고, 이유를 적은 뒤 결과 이미지를 저장하세요.</div>
          </div>
        </div>
      </div>

      <div class="panel">
        <div class="top-fields">
          <div class="otp-badge">OTP</div>
          <input id="otpInput" class="input" maxlength="8" placeholder="OTP를 입력하세요. (최대 8자)" />
          <input id="nicknameInput" class="input" maxlength="12" placeholder="아이디를 입력하세요. (최대 12자)" />
        </div>
      </div>

      <div id="membersEditor" class="members"></div>

      <div class="actions">
        <button class="btn secondary" id="resetBtn" type="button">초기화</button>
        <button class="btn" id="generateBtn" type="button">결과 생성</button>
      </div>
    </section>

    <section id="resultScreen" class="screen">
      <div class="result-wrap">
        <div id="resultCanvas"></div>
      </div>
      <div class="result-actions">
        <button class="btn secondary" id="backBtn" type="button">수정하러 가기</button>
        <button class="btn" id="downloadBtn" type="button">이미지 저장</button>
      </div>
    </section>
  </div>

  <script>
    const members = [
      {
        id: "james",
        name: "제임스",
        img: "img/james.webp",
        ratio: 50,
        reason: ""
      },
      {
        id: "juhoon",
        name: "주훈",
        img: "img/juhoon.webp",
        ratio: 50,
        reason: ""
      },
      {
        id: "martin",
        name: "마틴",
        img: "img/martin.webp",
        ratio: 50,
        reason: ""
      },
      {
        id: "seonghyeon",
        name: "성현",
        img: "img/seonghyeon.webp",
        ratio: 50,
        reason: ""
      },
      {
        id: "keonho",
        name: "건호",
        img: "img/keonho.webp",
        ratio: 50,
        reason: ""
      }
    ];

    const editorScreen = document.getElementById("editorScreen");
    const resultScreen = document.getElementById("resultScreen");
    const membersEditor = document.getElementById("membersEditor");
    const resultCanvas = document.getElementById("resultCanvas");
    const otpInput = document.getElementById("otpInput");
    const nicknameInput = document.getElementById("nicknameInput");
    const EXPORT_WIDTH = 1200;
    const EXPORT_HEIGHT = 800; // 4:3

    function escapeHtml(str) {
      return String(str)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/\"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    function setSliderBackground(slider) {
      const value = Number(slider.value);
      slider.style.setProperty("--fill", `${value}%`);
    }

    function renderEditors() {
      membersEditor.innerHTML = members.map((member, index) => `
        <article class="member-editor">
          <div class="member-top">
            <img class="avatar" src="${member.img}" alt="${member.name}" crossorigin="anonymous" />
            <div class="member-name">${member.name}</div>
          </div>

          <div class="member-grid">
            <div>
              <div class="ratio-header">
                <div class="ratio-side">공<span id="gongValue-${index}">${member.ratio}</span></div>
                <div class="slider-wrap">
                  <input
                    type="range"
                    min="0"
                    max="100"
                    value="${member.ratio}"
                    data-index="${index}"
                    id="slider-${index}"
                  />
                </div>
                <div class="ratio-side">수<span id="suValue-${index}">${100 - member.ratio}</span></div>
              </div>
            </div>
            <textarea
              class="textarea"
              id="reason-${index}"
              maxlength="300"
              placeholder="이 멤버의 공수 취향 이유를 적어주세요. (최대 300자)"
            >${escapeHtml(member.reason)}</textarea>
          </div>
        </article>
      `).join("");

      document.querySelectorAll('input[type="range"]').forEach((slider) => {
        setSliderBackground(slider);
        slider.addEventListener("input", (e) => {
          const index = Number(e.target.dataset.index);
          const value = Number(e.target.value);
          members[index].ratio = value;
          document.getElementById(`gongValue-${index}`).textContent = value;
          document.getElementById(`suValue-${index}`).textContent = 100 - value;
          setSliderBackground(e.target);
        });
      });

      members.forEach((_, index) => {
        const textarea = document.getElementById(`reason-${index}`);
        textarea.addEventListener("input", (e) => {
          members[index].reason = e.target.value;
        });
      });
    }

    function buildResult() {
      const cpName = otpInput.value.trim().slice(0, 12);
      const nickname = nicknameInput.value.trim().slice(0, 12);
      const displayId = nickname || "아이디";

      resultCanvas.innerHTML = `
        <div class="result-header">
          <div style="display:flex;align-items:center;gap:10px;">
            <div class="chip">OTP</div>
            <div>${escapeHtml(cpName || "CP")}</div>
          </div>
          <div class="result-title-box">
            <div class="result-logo">
              <img src="img/logo.jpg">
            </div>
            <div class="result-title">공수취향표</div>
          </div>
          <div class="nickname-chip">${escapeHtml(displayId)}</div>
        </div>

        <div class="result-grid">
          ${members.map((member) => `
            <section class="result-card">
              <div class="result-avatar" aria-label="${member.name}">
                <div
                  class="result-avatar-image"
                  style="background-image: url('${member.img}');"
                ></div>
              </div>
              <div class="result-content">
                <div class="bar-row">
                  <div class="bar-side">공<strong>${member.ratio}</strong></div>
                  <div class="bar-track">
                    <div class="bar-thumb" style="left: calc(${100 - member.ratio}% - 46px);"></div>
                  </div>
                  <div class="bar-side">수<strong>${100 - member.ratio}</strong></div>
                </div>
                <div class="reason-box">${escapeHtml(member.reason || " ")}</div>
              </div>
            </section>
          `).join("")}
        </div>

        <div class="result-footer">@makemcore</div>
      `;
    }

    function showResult() {
      buildResult();
      editorScreen.classList.remove("active");
      resultScreen.classList.add("active");
      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    function showEditor() {
      resultScreen.classList.remove("active");
      editorScreen.classList.add("active");
      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    function waitForImages(container) {
      const images = Array.from(container.querySelectorAll("img"));
      return Promise.all(
        images.map((img) => {
          if (img.complete) return Promise.resolve();
          return new Promise((resolve) => {
            img.onload = resolve;
            img.onerror = resolve;
          });
        })
      );
    }
    
    async function downloadImage() {
      const button = document.getElementById("downloadBtn");
      const original = button.textContent;
    
      try {
        button.disabled = true;
        button.textContent = "이미지 생성 중...";
    
        // 최신 내용으로 다시 렌더
        buildResult();
    
        // 고정 출력용 복제본 생성
        const exportStage = document.createElement("div");
        exportStage.style.position = "fixed";
        exportStage.style.left = "-99999px";
        exportStage.style.top = "0";
        exportStage.style.width = `${EXPORT_WIDTH}px`;
        exportStage.style.height = `${EXPORT_HEIGHT}px`;
        exportStage.style.overflow = "hidden";
        exportStage.style.pointerEvents = "none";
        exportStage.style.zIndex = "-1";
        exportStage.style.background = "transparent";
    
        const clone = resultCanvas.cloneNode(true);
        clone.style.width = `${EXPORT_WIDTH}px`;
        clone.style.height = `${EXPORT_HEIGHT}px`;
        clone.style.margin = "0";
        clone.style.transform = "none";
        clone.style.maxWidth = "none";
        clone.style.minWidth = `${EXPORT_WIDTH}px`;
        clone.style.minHeight = `${EXPORT_HEIGHT}px`;
    
        exportStage.appendChild(clone);
        document.body.appendChild(exportStage);
    
        await waitForImages(exportStage);
    
        const canvas = await html2canvas(clone, {
          backgroundColor: null,
          scale: 2,
          useCORS: true,
          allowTaint: false,
          logging: false,
          imageTimeout: 0,
          width: EXPORT_WIDTH,
          height: EXPORT_HEIGHT,
          windowWidth: EXPORT_WIDTH,
          windowHeight: EXPORT_HEIGHT,
          scrollX: 0,
          scrollY: 0
        });
    
        document.body.removeChild(exportStage);
    
        const link = document.createElement("a");
        link.download = "cortisrps.png";
        link.href = canvas.toDataURL("image/png");
        link.click();
      } catch (error) {
        console.error(error);
        alert("이미지 저장 중 문제가 발생했어요.");
      } finally {
        button.disabled = false;
        button.textContent = original;
      }
    }

    function resetAll() {
      otpInput.value = "";
      nicknameInput.value = "";
      members.forEach((member) => {
        member.ratio = 50;
        member.reason = "";
      });
      renderEditors();
      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    document.getElementById("generateBtn").addEventListener("click", showResult);
    document.getElementById("backBtn").addEventListener("click", showEditor);
    document.getElementById("downloadBtn").addEventListener("click", downloadImage);
    document.getElementById("resetBtn").addEventListener("click", resetAll);

    renderEditors();
  </script>
</body>
</html>
